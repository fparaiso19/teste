  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

el><label class=\"ac-filter-item active\"><input type=\"checkbox\" class=\"acpf\" data-name=\"Marina\" checked=\"\" onchange=\"acApplyFilter()\"> Marina<\u002Flabel><label class=\"ac-filter-item active\"><input type=\"checkbox\" class=\"acpf\" data-name=\"Fernanda\" checked=\"\" onchange=\"acApplyFilter()\"> Fernanda<\u002Flabel><label class=\"ac-filter-item active\"><input type=\"checkbox\" class=\"acpf\" data-name=\"Victoria\" checked=\"\" onchange=\"acApplyFilter()\"> Victoria<\u002Flabel><label class=\"ac-filter-item active\"><input type=\"checkbox\" class=\"acpf\" data-name=\"Thauanna\" checked=\"\" onchange=\"acApplyFilter()\"> Thauanna<\u002Flabel><\u002Fdiv><\u002Fdiv>\n        <div class=\"ac-legenda\"><h3>Legenda:<\u002Fh3><div class=\"ac-legenda-items\"><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#1565c0\"><\u002Fdiv> Aula R2<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#c62828\"><\u002Fdiv> Caso R2<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#e65100\"><\u002Fdiv> Artigo<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#7e57c2\"><\u002Fdiv> R3<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#43a047\"><\u002Fdiv> R1<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#78909c\"><\u002Fdiv> Fellow<\u002Fdiv><div class=\"ac-legenda-item\"><div class=\"ac-legenda-color\" style=\"background:#e0e0e0\"><\u002Fdiv> Sem reunião<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div id=\"acScheduleContainer\"><\u002Fdiv>\n        <div class=\"ac-summary-card collapsible-panel ac-card-collapsible\" id=\"acSummaryPanel\"><div class=\"ac-summary-header\"><span>📊 Resumo da Distribuição (inclui pré-17/03)<\u002Fspan><button type=\"button\" class=\"collapse-toggle\" aria-expanded=\"true\" onclick=\"toggleCollapsiblePanel('acSummaryPanel')\"><span class=\"collapse-toggle-icon\" aria-hidden=\"true\">-<\u002Fspan><span class=\"collapse-toggle-text\">Minimizar<\u002Fspan><\u002Fbutton><\u002Fdiv><div class=\"collapsible-panel-content\" style=\"overflow-x:auto\"><table class=\"ac-summary-table\"><thead><tr><th>Residente<\u002Fth><th>📚 Aulas<\u002Fth><th>🏥 Casos<\u002Fth><th>📄 Artigos<\u002Fth><th>Total<\u002Fth><th>Férias<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"acSummaryBody\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"ac-ferias-card collapsible-panel ac-card-collapsible\" id=\"acFeriasPanel\"><div class=\"ac-summary-header\"><span>🏖️ Férias dos Residentes<\u002Fspan><button type=\"button\" class=\"collapse-toggle\" aria-expanded=\"true\" onclick=\"toggleCollapsiblePanel('acFeriasPanel')\"><span class=\"collapse-toggle-icon\" aria-hidden=\"true\">-<\u002Fspan><span class=\"collapse-toggle-text\">Minimizar<\u002Fspan><\u002Fbutton><\u002Fdiv><div class=\"collapsible-panel-content\"><div id=\"acFeriasContainer\" style=\"padding:8px 0\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"ac-timeline-card collapsible-panel ac-card-collapsible\" id=\"acTimelinePanel\"><div class=\"ac-summary-header\"><span>📅 Cronograma de Apresentações R2<\u002Fspan><button type=\"button\" class=\"collapse-toggle\" aria-expanded=\"true\" onclick=\"toggleCollapsiblePanel('acTimelinePanel')\"><span class=\"collapse-toggle-icon\" aria-hidden=\"true\">-<\u002Fspan><span class=\"collapse-toggle-text\">Minimizar<\u002Fspan><\u002Fbutton><\u002Fdiv><div class=\"collapsible-panel-content\"><div id=\"acTimelineContainer\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><!-- end page-aulas -->\n    <div id=\"page-ciclos\" class=\"page-content\">\n        <div class=\"ac-header\"><h1>🔄 Mapeamento de Ciclos R2 (A-H)<\u002Fh1><p>Escala de rotação obrigatória. O Ciclo <strong>H<\u002Fstrong> corresponde ao período de férias (30 dias).<\u002Fp><\u002Fdiv>\n        <div class=\"ac-summary-card\">\n            <div class=\"ac-summary-header\">Tabela de Rotação por Período<\u002Fdiv>\n            <div style=\"overflow-x:auto\">\n                <table class=\"ac-summary-table\" id=\"ciclosTable\">\n                    <thead><tr id=\"cTHead\"><\u002Ftr><\u002Fthead>\n                    <tbody id=\"cTBody\"><\u002Ftbody>\n                <\u002Ftable>\n            <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ac-summary-card\" id=\"ciclos2-section\">\n            <div class=\"ac-summary-header\">Atividades Semanais por Ciclo<\u002Fdiv>\n            <div style=\"padding:12px\">\n                <div class=\"ciclo-grid\" id=\"cicloCardsContainer\"><\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ac-summary-card\" id=\"miniciclos-section\">\n            <div class=\"ac-summary-header\">Atividades Semanais por Miniciclo (01/03–03/05/2026)<\u002Fdiv>\n            <div style=\"padding:12px\">\n                <div class=\"ciclo-grid\" id=\"minicicloCardsContainer\"><\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv><!-- end page-ciclos -->\n    <script>\n        const THEME_STORAGE_KEY = 'escalaThemePreference';\n        let escalaViewMode = 'calendar';\n        let currentMonthIndex = 0;\n        const months = document.querySelectorAll('.month-container');\n        const monthSelect = document.getElementById('monthSelect');\n\n        function getSavedThemePreference() {\n            try {\n                const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);\n                return ['system', 'light', 'dark'].includes(savedTheme) ? savedTheme : 'system';\n            } catch (error) {\n                return 'system';\n            }\n        }\n\n        function updateThemeToggle(theme) {\n            document.querySelectorAll('.theme-btn').forEach(button => {\n                const isActive = button.dataset.themeOption === theme;\n                button.classList.toggle('active', isActive);\n                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');\n            });\n        }\n\n        function applyThemePreference(theme) {\n            if (theme === 'light' || theme === 'dark') {\n                document.documentElement.setAttribute('data-theme', theme);\n            } else {\n                document.documentElement.removeAttribute('data-theme');\n            }\n            updateThemeToggle(theme);\n        }\n\n        function setThemePreference(theme) {\n            applyThemePreference(theme);\n            try {\n                localStorage.setItem(THEME_STORAGE_KEY, theme);\n            } catch (error) {}\n        }\n\n        applyThemePreference(getSavedThemePreference());\n\n        // Populate dropdown grouped by year\n        let currentYear = null;\n        let optgroup = null;\n        months.forEach((month, index) => {\n            const headerText = month.querySelector('.month-header').textContent;\n            const [monthName, year] = headerText.split(' ');\n            if (year !== currentYear) {\n                currentYear = year;\n                optgroup = document.createElement('optgroup');\n                optgroup.label = year;\n                monthSelect.appendChild(optgroup);\n            }\n            const option = document.createElement('option');\n            option.value = index;\n            option.textContent = monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' (' + year + ')';\n            optgroup.appendChild(option);\n        });\n\n        function showMonth(index) {\n            months.forEach((m, i) => m.classList.toggle('active', i === index));\n            currentMonthIndex = index;\n            monthSelect.value = index;\n            document.getElementById('prevBtn').disabled = index === 0;\n            document.getElementById('nextBtn').disabled = index === months.length - 1;\n            if (document.getElementById('activityFilters').classList.contains('visible')) {\n                updateActivityFilterPanel();\n                filterActivity();\n            }\n        }\n\n        function navigateMonth(delta) {\n            const newIndex = currentMonthIndex + delta;\n            if (newIndex >= 0 && newIndex < months.length) {\n                showMonth(newIndex);\n            }\n        }\n\n        function goToMonth(index) {\n            showMonth(parseInt(index));\n        }\n\n        function goToToday() {\n            const todayMonthIndex = findCurrentMonth();\n            showMonth(todayMonthIndex);\n            requestAnimationFrame(() => {\n                if (escalaViewMode === 'agenda') {\n                    renderAgenda();\n                    requestAnimationFrame(() => {\n                        const agendaTodayEl = document.querySelector('.agenda-day-today') ||\n                            document.querySelector('.agenda-summary') ||\n                            document.getElementById('agendaView');\n                        if (agendaTodayEl) {\n                            agendaTodayEl.scrollIntoView({behavior: 'smooth', block: 'center', inline: 'nearest'});\n                        }\n                    });\n                    return;\n                }\n                const activeTodayEl = document.querySelector('.month-container.active .day.today');\n                if (activeTodayEl) {\n                    activeTodayEl.scrollIntoView({behavior: 'smooth', block: 'center', inline: 'nearest'});\n                }\n            });\n        }\n\n        function updateEscalaViewToggle(mode) {\n            document.querySelectorAll('.view-btn').forEach(button => {\n                const isActive = button.dataset.escalaView === mode;\n                button.classList.toggle('active', isActive);\n                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');\n            });\n        }\n\n        function parseAgendaDate(dateStr) {\n            const [year, month, day] = dateStr.split('-').map(Number);\n            return new Date(year, month - 1, day);\n        }\n\n        function formatAgendaMonth(dateStr) {\n            const date = parseAgendaDate(dateStr);\n            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];\n            return monthNames[date.getMonth()] + ' ' + date.getFullYear();\n        }\n\n        function formatAgendaDate(dateStr) {\n            const date = parseAgendaDate(dateStr);\n            return String(date.getDate()).padStart(2, '0') + '/' + String(date.getMonth() + 1).padStart(2, '0') + '/' + date.getFullYear();\n        }\n\n        function formatAgendaWeekday(dateStr) {\n            const date = parseAgendaDate(dateStr);\n            const weekdayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];\n            return weekdayNames[date.getDay()];\n        }\n\n        function escapeAgendaHtml(text) {\n            return String(text)\n                .replace(/&/g, '&amp;')\n                .replace(/<\u002Fg, '&lt;')\n                .replace(/>/g, '&gt;')\n                .replace(/\"/g, '&quot;')\n                .replace(/'/g, '&#39;');\n        }\n\n        function getAgendaDayTags(day, date) {\n            const tags = [];\n            if (date === todayStr) tags.push({text: 'Hoje', className: 'is-today'});\n            if (day.classList.contains('feriado')) tags.push({text: 'Feriado'});\n            if (day.classList.contains('recesso')) tags.push({text: 'Recesso'});\n            if (day.classList.contains('carnaval')) tags.push({text: 'Carnaval'});\n            if (day.classList.contains('cbo')) tags.push({text: 'CBO'});\n            if (day.classList.contains('finalDeSemana')) tags.push({text: 'Final de Semana'});\n            else if (day.classList.contains('weekend')) tags.push({text: 'Fim de Semana'});\n            return tags;\n        }\n\n        function getAgendaItemMeta(el) {\n            if (el.classList.contains('plantao')) return {kind: 'plantao', label: 'Plantão'};\n            if (el.classList.contains('ps-badge')) return {kind: 'ps', label: 'PS'};\n            if (el.classList.contains('cycle-badge')) return {kind: 'ciclo', label: 'Ciclo'};\n            if (el.classList.contains('cal-ac-aula')) return {kind: 'aula', label: 'Aula'};\n            if (el.classList.contains('cal-ac-caso')) return {kind: 'caso', label: 'Caso'};\n            if (el.classList.contains('cal-ac-art')) return {kind: 'artigo', label: 'Artigo'};\n            if (el.classList.contains('cal-ac-skip')) return {kind: 'skip', label: 'Sem Reunião'};\n            if (el.classList.contains('ferias')) return {kind: 'ferias', label: 'Férias'};\n            if (el.classList.contains('folga')) return {kind: 'folga', label: 'Folga'};\n            return {kind: 'evento', label: 'Projeto'};\n        }\n\n        function renderAgenda() {\n            const agendaView = document.getElementById('agendaView');\n            if (!agendaView) return;\n\n            const selectedPessoas = Array.from(document.querySelectorAll('.pessoa-filter:checked')).map(cb => cb.dataset.pessoa);\n            if (selectedPessoas.length === 0) {\n                agendaView.innerHTML = '<div class=\"agenda-empty\">Selecione pelo menos um residente para visualizar a agenda a partir de hoje.<\u002Fdiv>';\n                return;\n            }\n\n            const includeFolgas = !!document.getElementById('showFolgas')?.checked;\n            const monthBuckets = new Map();\n            const kindPriority = {plantao: 0, ps: 1, evento: 2, ciclo: 3, aula: 4, caso: 5, artigo: 6, skip: 7, ferias: 8, folga: 9};\n\n            document.querySelectorAll('.day[data-date]').forEach(day => {\n                const date = day.dataset.date;\n                if (!date || date < todayStr) return;\n\n                const items = [];\n                day.querySelectorAll('.plantao, .evento, .ferias, .folga, .ps-badge, .cycle-badge, .cal-ac-badge').forEach(el => {\n                    if (el.classList.contains('folga') && !includeFolgas) return;\n                    if (el.classList.contains('hidden-pessoa') || el.classList.contains('hidden-activity')) return;\n                    const elPessoas = el.dataset.pessoas ? el.dataset.pessoas.split(',').filter(Boolean) : [];\n                    if (elPessoas.length > 0 && !elPessoas.some(p => selectedPessoas.includes(p))) return;\n                    const meta = getAgendaItemMeta(el);\n                    items.push({kind: meta.kind, label: meta.label, text: el.textContent.trim()});\n                });\n\n                if (items.length === 0) return;\n                items.sort((a, b) => (kindPriority[a.kind] - kindPriority[b.kind]) || a.text.localeCompare(b.text, 'pt-BR'));\n\n                const monthLabel = formatAgendaMonth(date);\n                if (!monthBuckets.has(monthLabel)) monthBuckets.set(monthLabel, []);\n                monthBuckets.get(monthLabel).push({\n                    date,\n                    weekday: formatAgendaWeekday(date),\n                    formattedDate: formatAgendaDate(date),\n                    tags: getAgendaDayTags(day, date),\n                    items\n                });\n            });\n\n            if (monthBuckets.size === 0) {\n                agendaView.innerHTML = '<div class=\"agenda-empty\">Nenhum item futuro encontrado para os residentes selecionados.<\u002Fdiv>';\n                return;\n            }\n\n            let html = '<div class=\"agenda-summary\">';\n            html += '<h3>Agenda dos Residentes Selecionados<\u002Fh3>';\n            html += '<p>A partir de ' + formatAgendaDate(todayStr) + ' · ' + escapeAgendaHtml(selectedPessoas.join(', ')) + '<\u002Fp>';\n            html += '<\u002Fdiv>';\n\n            monthBuckets.forEach((entries, monthLabel) => {\n                html += '<section class=\"agenda-month-group\">';\n                html += '<div class=\"agenda-month-header\">' + escapeAgendaHtml(monthLabel) + '<\u002Fdiv>';\n                entries.forEach(entry => {\n                    html += '<article class=\"agenda-day-card' + (entry.date === todayStr ? ' agenda-day-today' : '') + '\">';\n                    html += '<div class=\"agenda-day-head\">';\n                    html += '<div><div class=\"agenda-day-title\">' + escapeAgendaHtml(entry.weekday + ', ' + entry.formattedDate) + '<\u002Fdiv>';\n                    html += '<div class=\"agenda-day-subtitle\">' + entry.items.length + ' item(ns)<\u002Fdiv><\u002Fdiv>';\n                    html += '<div class=\"agenda-day-tags\">';\n                    entry.tags.forEach(tag => {\n                        html += '<span class=\"agenda-day-tag' + (tag.className ? ' ' + tag.className : '') + '\">' + escapeAgendaHtml(tag.text) + '<\u002Fspan>';\n                    });\n                    html += '<\u002Fdiv><\u002Fdiv>';\n                    html += '<div class=\"agenda-item-list\">';\n                    entry.items.forEach(item => {\n                        html += '<div class=\"agenda-item\">';\n                        html += '<span class=\"agenda-item-kind kind-' + item.kind + '\">' + escapeAgendaHtml(item.label) + '<\u002Fspan>';\n                        html += '<div class=\"agenda-item-text\">' + escapeAgendaHtml(item.text) + '<\u002Fdiv>';\n                        html += '<\u002Fdiv>';\n                    });\n                    html += '<\u002Fdiv><\u002Farticle>';\n                });\n                html += '<\u002Fsection>';\n            });\n\n            agendaView.innerHTML = html;\n        }\n\n        function setEscalaView(mode) {\n            escalaViewMode = mode;\n            const isAgenda = mode === 'agenda';\n            document.getElementById('page-escala').classList.toggle('agenda-mode', isAgenda);\n            updateEscalaViewToggle(mode);\n            if (isAgenda) renderAgenda();\n            else showMonth(currentMonthIndex);\n        }\n\n        function setCollapsiblePanelCollapsed(panel, collapsed) {\n            panel.classList.toggle('collapsed', collapsed);\n            const toggle = panel.querySelector('.collapse-toggle');\n            if (!toggle) return;\n            toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');\n            const icon = toggle.querySelector('.collapse-toggle-icon');\n            const text = toggle.querySelector('.collapse-toggle-text');\n            if (icon) icon.textContent = collapsed ? '+' : '-';\n            if (text) text.textContent = collapsed ? 'Expandir' : 'Minimizar';\n        }\n\n        function toggleCollapsiblePanel(panelId) {\n            const panel = document.getElementById(panelId);\n            if (!panel) return;\n            setCollapsiblePanelCollapsed(panel, !panel.classList.contains('collapsed'));\n        }\n\n        function initializeCollapsibleTables() {\n            document.querySelectorAll('.tabela-container').forEach((panel, index) => {\n                if (panel.dataset.collapsibleInitialized === 'true') return;\n                const header = Array.from(panel.children).find(child => child.classList.contains('tabela-header'));\n                if (!header) return;\n                const title = header.textContent.trim();\n                if (!title.startsWith('Plantões Especiais') && !title.startsWith('Projetos')) return;\n\n                panel.classList.add('collapsible-panel', 'table-collapsible');\n                panel.id = panel.id || 'tableCollapsiblePanel' + index;\n\n                const content = document.createElement('div');\n                content.className = 'collapsible-panel-content';\n                Array.from(panel.childNodes).forEach(node => {\n                    if (node !== header) content.appendChild(node);\n                });\n                panel.appendChild(content);\n\n                header.textContent = '';\n                const titleEl = document.createElement('span');\n                titleEl.className = 'tabela-header-title';\n                titleEl.textContent = title;\n                const button = document.createElement('button');\n                button.type = 'button';\n                button.className = 'collapse-toggle';\n                button.setAttribute('aria-expanded', 'true');\n                button.innerHTML = '<span class=\"collapse-toggle-icon\" aria-hidden=\"true\">-<\u002Fspan><span class=\"collapse-toggle-text\">Minimizar<\u002Fspan>';\n                button.addEventListener('click', () => toggleCollapsiblePanel(panel.id));\n                header.appendChild(titleEl);\n                header.appendChild(button);\n                panel.dataset.collapsibleInitialized = 'true';\n            });\n        }\n\n        initializeCollapsibleTables();\n\n        // Always show year selector and default to current year\n        document.getElementById('yearSelector').classList.add('visible');\n        (function() {\n            var yearSelect = document.getElementById('yearSelect');\n            var currentYear = String(new Date().getFullYear());\n            var options = yearSelect.options;\n            var found = false;\n            for (var i = 0; i < options.length; i++) {\n                if (options[i].value === currentYear) {\n                    yearSelect.value = currentYear;\n                    found = true;\n                    break;\n                }\n            }\n            filterTablesByYear(found ? currentYear : 'all');\n        })();\n\n        // Show admin-only tables and controls if ?admin is in URL\n        if (window.location.search.includes('admin')) {\n            var selectedYear = document.getElementById('yearSelect').value;\n            document.querySelectorAll('.tabela-container.admin-only[data-year=\"' + selectedYear + '\"]').forEach(t => t.classList.add('visible'));\n            document.getElementById('problemas').classList.add('visible');\n            document.getElementById('folga ;\n        const todayStr = yyyy + '-' + mm + '-' + dd;\n        const todayEl = document.querySelector('.day[data-date=\"' + todayStr + '\"]');\n        if (todayEl) todayEl.classList.add('today');\n\n        showMonth(findCurrentMonth());\n        updateEscalaViewToggle(escalaViewMode);\n\n        function toggleAll(checkbox) {\n            const checked = checkbox.checked;\n            document.querySelectorAll('.pessoa-filter').forEach(cb => {\n                cb.checked = checked;\n                cb.parentElement.classList.toggle('active', checked);\n            });\n            checkbox.parentElement.classList.toggle('active', checked);\n            filterPessoa();\n        }\n\n        function filterPessoa() {\n            const selectedPessoas = Array.from(document.querySelectorAll('.pessoa-filter:checked'))\n                .map(cb => cb.dataset.pessoa);\n\n            document.querySelectorAll('.pessoa-filter').forEach(cb => {\n                cb.parentElement.classList.toggle('active', cb.checked);\n            });\n\n            document.querySelectorAll('.day[data-pessoas]').forEach(day => {\n                const pessoas = day.dataset.pessoas.split(',').filter(p => p);\n                const visible = pessoas.length === 0 || pessoas.some(p => selectedPessoas.includes(p));\n                day.querySelectorAll('.plantao, .evento, .folga, .ferias, .cal-ac-badge, .ps-badge, .cycle-badge').forEach(el => {\n                    const elPessoas = el.dataset.pessoas ? el.dataset.pessoas.split(',') : [];\n                    el.classList.toggle('hidden-pessoa', elPessoas.length > 0 && !elPessoas.some(p => selectedPessoas.includes(p)));\n                });\n            });\n\n            const allCheckbox = document.getElementById('all');\n            const allChecked = document.querySelectorAll('.pessoa-filter').length ===\n                              document.querySelectorAll('.pessoa-filter:checked').length;\n            allCheckbox.checked = allChecked;\n            allCheckbox.parentElement.classList.toggle('active', allChecked);\n\n            // Show/hide activity filter panel\n            const anySelected = selectedPessoas.length > 0;\n            document.getElementById('activityFilters').classList.toggle('visible', anySelected);\n            if (anySelected) updateActivityFilterPanel();\n            filterActivity();\n            if (escalaViewMode === 'agenda') renderAgenda();\n        }\n\n        function updateActivityFilterPanel() {\n            const activeMonth = document.querySelector('.month-container.active');\n            if (!activeMonth) return;\n            const selectedPessoas = Array.from(document.querySelectorAll('.pessoa-filter:checked')).map(cb => cb.dataset.pessoa);\n            // Preserve unchecked state before rebuilding\n            const previouslyUncheckedActivities = new Set(\n                Array.from(document.querySelectorAll('.act-filter:not(:checked)')).map(cb => cb.dataset.activity)\n            );\n            const previouslyUncheckedResidents = new Set(\n                Array.from(document.querySelectorAll('.act-pessoa-filter:not(:checked)')).map(cb => cb.dataset.pessoa)\n            );\n            const activities = new Set();\n            const residentsWithActivities = new Set();\n            activeMonth.querySelectorAll('.cycle-badge').forEach(badge => {\n                if (selectedPessoas.includes(badge.dataset.pessoas)) {\n                    activities.add(badge.dataset.activity);\n                    residentsWithActivities.add(badge.dataset.pessoas);\n                }\n            });\n            const residentSection = document.getElementById('activityResidentSection');\n            const availableResidents = selectedPessoas.filter(pessoa => residentsWithActivities.has(pessoa));\n            let residentHtml = '';\n            if (availableResidents.length > 0) {\n                residentHtml += '<span class=\"activity-filter-group-label\">Residentes:<\u002Fspan><div class=\"activity-filter-group\">';\n                residentHtml += '<label class=\"activity-filter-item active\"><input type=\"checkbox\" id=\"actResidentAll\" checked onchange=\"toggleAllActivityResidents(this)\"> Todos os residentes<\u002Flabel>';\n                availableResidents.forEach(pessoa => {\n                    const isChecked = !previouslyUncheckedResidents.has(pessoa);\n                    const checkedAttr = isChecked ? 'checked' : '';\n                    const activeClass = isChecked ? 'active' : '';\n                    residentHtml += `<label class=\"activity-filter-item ${activeClass}\"><input type=\"checkbox\" class=\"act-pessoa-filter\" data-pessoa=\"${pessoa}\" ${checkedAttr} onchange=\"filterActivity()\"> ${pessoa}<\u002Flabel>`;\n                });\n                residentHtml += '<\u002Fdiv>';\n            }\n            residentSection.innerHTML = residentHtml;\n            const groups = {'Ambulatorio':[], 'Cirurgia':[], 'PO':[], 'Outros':[]};\n            activities.forEach(act => {\n                if (act.startsWith('Amb.')) groups['Ambulatorio'].push(act);\n                else if (act.startsWith('Cir.')) groups['Cirurgia'].push(act);\n                else if (act === 'PO') groups['PO'].push(act);\n                else groups['Outros'].push(act);\n            });\n            const container = document.getElementById('activityFilterGroups');\n            let html = '';\n            for (const [label, acts] of Object.entries(groups)) {\n                if (acts.length === 0) continue;\n                html += `<span class=\"activity-filter-group-label\">${label}:<\u002Fspan><div class=\"activity-filter-group\">`;\n                acts.sort().forEach(act => {\n                    const isChecked = !previouslyUncheckedActivities.has(act);\n                    const checkedAttr = isChecked ? 'checked' : '';\n                    const activeClass = isChecked ? 'active' : '';\n                    html += `<label class=\"activity-filter-item ${activeClass}\"><input type=\"checkbox\" class=\"act-filter\" data-activity=\"${act}\" ${checkedAttr} onchange=\"filterActivity()\"> ${act}<\u002Flabel>`;\n                });\n                html += '<\u002Fdiv>';\n            }\n            container.innerHTML = html;\n        }\n\n        function filterActivity() {\n            const allActCbs = document.querySelectorAll('.act-filter');\n            const allResidentCbs = document.querySelectorAll('.act-pessoa-filter');\n            if (allActCbs.length === 0 && allResidentCbs.length === 0) {\n                document.querySelectorAll('.cycle-badge.hidden-activity').forEach(b => b.classList.remove('hidden-activity'));\n                if (escalaViewMode === 'agenda') renderAgenda();\n                return;\n            }\n            const checkedActivities = Array.from(document.querySelectorAll('.act-filter:checked')).map(cb => cb.dataset.activity);\n            const checkedResidents = Array.from(document.querySelectorAll('.act-pessoa-filter:checked')).map(cb => cb.dataset.pessoa);\n            const allActivitiesChecked = allActCbs.length > 0 && checkedActivities.length === allActCbs.length;\n            const allResidentsChecked = allResidentCbs.length > 0 && checkedResidents.length === allResidentCbs.length;\n            document.querySelectorAll('.cycle-badge').forEach(badge => {\n                const activityVisible = allActCbs.length === 0 || checkedActivities.includes(badge.dataset.activity);\n                const residentVisible = allResidentCbs.length === 0 || checkedResidents.includes(badge.dataset.pessoas);\n                badge.classList.toggle('hidden-activity', !(activityVisible && residentVisible));\n            });\n            const allCb = document.getElementById('actFilterAll');\n            if (allCb) {\n                allCb.checked = allActivitiesChecked;\n                allCb.parentElement.classList.toggle('active', allActivitiesChecked);\n            }\n           overlay.classList.remove('active');\n            overlay.setAttribute('aria-hidden', 'true');\n            if (icsLastFocusedElement && typeof icsLastFocusedElement.focus === 'function') {\n                icsLastFocusedElement.focus();\n            }\n        }\n\n        document.addEventListener('keydown', function(event) {\n            if (event.key === 'Escape' && document.getElementById('icsModal')?.classList.contains('active')) {\n                closeIcsModal();\n            }\n        });\n\n        function generateIcs(pessoa) {\n            var startMonth = document.getElementById('icsStart').value;\n            var endMonth = document.getElementById('icsEnd').value;\n            closeIcsModal();\n            var events = [];\n            document.querySelectorAll('.day[data-date]').forEach(function(day) {\n                var date = day.dataset.date;\n                var dateMonth = date.substring(0, 7);\n                if (dateMonth < startMonth || dateMonth > endMonth) return;\n                day.querySelectorAll('.plantao').forEach(function(el) {\n                    var pessoas = el.dataset.pessoas ? el.dataset.pessoas.split(',') : [];\n                    if (pessoas.indexOf(pessoa) >= 0) {\n                        var summary = 'Plantão';\n                        if (day.classList.contains('feriado')) summary += ' (Feriado)';\n                        else if (day.classList.contains('recesso')) summary += ' (Recesso)';\n                        else if (day.classList.contains('carnaval')) summary += ' (Carnaval)';\n                        else if (day.classList.contains('cbo')) summary += ' (CBO)';\n                        else if (day.classList.contains('finalDeSemana')) summary += ' (Final de Semana)';\n                        events.push({ date: date, summary: summary });\n                    }\n                });\n                day.querySelectorAll('.evento').forEach(function(el) {\n                    var pessoas = el.dataset.pessoas ? el.dataset.pessoas.split(',') : [];\n                    if (pessoas.indexOf(pessoa) >= 0) {\n                        var text = el.textContent.trim();\n                        var summary = text.split(':')[0].trim();\n                        events.push({ date: date, summary: summary });\n                    }\n                });\n            });\n            var ics = 'BEGIN:VCALENDAR\\r\\nVERSION:2.0\\r\\nPRODID:-//Escala Residencia//PT\\r\\nCALSCALE:GREGORIAN\\r\\n';\n            events.forEach(function(ev) {\n                var dtstart = ev.date.replace(/-/g, '');\n                var d = new Date(ev.date + 'T12:00:00');\n                d.setDate(d.getDate() + 1);\n                var dtend = d.toISOString().slice(0, 10).replace(/-/g, '');\n                var uid = ev.summary.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + dtstart + '-' + pessoa.toLowerCase() + '@escala-residencia';\n                ics += 'BEGIN:VEVENT\\r\\n';\n                ics += 'DTSTART;VALUE=DATE:' + dtstart + '\\r\\n';\n                ics += 'DTEND;VALUE=DATE:' + dtend + '\\r\\n';\n                ics += 'SUMMARY:' + ev.summary + '\\r\\n';\n                ics += 'UID:' + uid + '\\r\\n';\n                ics += 'END:VEVENT\\r\\n';\n            });\n            ics += 'END:VCALENDAR\\r\\n';\n            var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });\n            var url = URL.createObjectURL(blob);\n            var a = document.createElement('a');\n            a.href = url;\n            a.download = 'escala-' + pessoa.toLowerCase() + '.ics';\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n\n        // Analytics: collect and send visit data\n        (function() {\n            try {\n                var nav = navigator;\n                var conn = nav.connection || nav.mozConnection || nav.webkitConnection || {};\n                var data = {\n        }\n            };\n\n            const container = document.getElementById('cicloCardsContainer');\n            let html = '';\n\n            Object.entries(CICLO_DATA).forEach(([cycle, data]) => {\n                const psText = data.ps.length ? data.ps.map(p => `${p.day} ${p.hr}`).join(' | ') : 'Sem PS';\n                html += `<div class=\"ciclo-card\">`;\n                html += `<div class=\"ciclo-card-header\"><span>Estágio ${cycle}<\u002Fspan><span class=\"ciclo-ps-info\">🏥 ${psText}<\u002Fspan><\u002Fdiv>`;\n                html += `<table><thead><tr><th style=\"width:50px\"><\u002Fth>`;\n                DAYS.forEach(d => html += `<th>${d}<\u002Fth>`);\n                html += `<\u002Ftr><\u002Fthead><tbody>`;\n\n                ['AM','PM'].forEach(slot => {\n                    const label = slot === 'AM' ? '☀️ AM' : '🌙 PM';\n                    html += `<tr><td class=\"ciclo-slot-label\">${label}<\u002Ftd>`;\n                    DAY_IDX.forEach(di => {\n                        const dayData = data.acts[di];\n                        const psOnDay = data.ps.find(p => p.weekday === di);\n\n                        if (psOnDay && !dayData) {\n                            // Full-day PS, no activities\n                            if (slot === 'AM') {\n                                html += `<td class=\"ciclo-ps\" rowspan=\"2\">PS<br>${psOnDay.hr}<\u002Ftd>`;\n                            }\n                            // PM cell absorbed by rowspan\n                        } else {\n                            const act = dayData ? (dayData[slot] || '') : '';\n                            let cls = '';\n                            if (act.startsWith('Cir.') || act.startsWith('CIRURGIA') || act.startsWith('PC ')) cls = ' ciclo-act-cir';\n                            else if (act === 'PO') cls = ' ciclo-act-po';\n                            else if (act.startsWith('PS ')) cls = ' ciclo-ps';\n                            html += `<td class=\"${cls}\">${act}<\u002Ftd>`;\n                        }\n                    });\n                    html += `<\u002Ftr>`;\n                });\n\n                html += `<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n            });\n\n            container.innerHTML = html;\n        })();\n\n        // --- MINICICLO CARDS ---\n        (function renderMinicicloCards() {\n            const DAYS = ['Seg','Ter','Qua','Qui','Sex'];\n            const DAY_IDX = [1,2,3,4,5];\n\n            const MINI_DATA = {\n                'A': {\n                    acts: {1:{AM:'Amb. Plástica',PM:'PC Plástica'},2:{AM:'Amb. Glaucoma',PM:'Amb. Plástica'},3:{AM:'Cir. Catarata',PM:'Amb. Retina'},4:{AM:'Cir. Glaucoma',PM:'Amb. Plástica'},5:{PM:'Amb. Neuroftalmo'}},\n                    ps: [{day:'Sáb', hr:'24h (07–07)'}]\n                },\n                'B': {\n                    acts: {1:{AM:'Amb. Catarata',PM:'Amb. Triagem Geral'},2:{AM:'Amb. Lentes de Contato',PM:'Amb. Córnea'},4:{PM:'Cir. Catarata'},5:{AM:'Amb. VSN/PO',PM:'Amb. Retina'}},\n                    ps: [{day:'Qua', hr:'24h (07–07)', weekday:3}]\n                },\n                'C': {\n                    acts: {1:{AM:'Yag/PO'},2:{AM:'Amb. Retina',PM:'Amb. Catarata'},3:{AM:'Amb. Glaucoma',PM:'Cir. Catarata'},4:{AM:'Amb. Catarata',PM:'Cir. Catarata'}},\n                    ps: [{day:'Sex', hr:'24h (07–07)', weekday:5}]\n                },\n                'D': {\n                    acts: {1:{PM:'Amb. Triagem Geral'},2:{AM:'Amb. Triagem Geral'},3:{AM:'Amb. Retina',PM:'Amb. Oncologia'},4:{AM:'Amb. Córnea',PM:'PC Córnea'},5:{AM:'Cir. Catarata',PM:'Amb. VSN/PO'}},\n                    ps: [{day:'Dom', hr:'24h (07–07)'}]\n                },\n                'E': {\n                    acts: {2:{PM:'Amb. Lentes de Contato'},3:{AM:'PO',PM:'Córnea'},4:{AM:'Cir. Catarata',PM:'Amb. Glaucoma'},5:{AM:'Amb. Córnea',PM:'Cir. Catarata'}},\n                    ps: [{day:'Seg', hr:'24h (07–07)', weekday:1}]\n                },\n                'F': {\n                    acts: {1:{AM:'Amb. Estrabismo',PM:'Amb. Estrabismo/PO'},3:{PM:'Cir. Catarata'},4:{AM:'Amb. Úvea',PM:'Cir. Glaucoma R2 R3'},5:{AM:'Amb. Glaucoma',PM:'Amb. Estrabismo'}},\n                    ps: [{day:'Ter', hr:'24h (07–07)', weekday:2}]\n                },\n                'G': {\n                    acts: {1:{AM:'Triagem Geral',PM:'Triagem Geral'},2:{AM:'Amb. Triagem Geral',PM:'Oftalmopediatria'},3:{AM:'Amb. Refrativa',PM:'Amb. Catarata'},5:{PM:'Cir. Catarata'}},\n                    ps: [{day:'Qui', hr:'24h (07–07)', weekday:4}]\n                },\n                'H': {\n                    acts: {1:{AM:'PS 9-21h',PM:'PS 9-21h'},2:{AM:'PS 9-21h',PM:'PS 9-21h'},3:{AM:'PS 9-21h',PM:'PS 9-21h'},4:{AM:'PS 9-21h',PM:'PS 9-21h'},5:{AM:'PS 9-21h',PM:'PS 9-21h'}},\n                    ps: [{day:'Seg-Sex', hr:'9-21h (12h/dia)'}]\n                }\n            };\n\n            const container = document.getElementById('minicicloCardsContainer');\n            let html = '';\n\n            Object.entries(MINI_DATA).forEach(([cycle, data]) => {\n                const psText = data.ps.map(p => `${p.day} ${p.hr}`).join(' | ');\n                html += `<div class=\"ciclo-card\">`;\n                html += `<div class=\"ciclo-card-header\"><span>Miniciclo ${cycle}<\u002Fspan><span class=\"ciclo-ps-info\">🏥 ${psText}<\u002Fspan><\u002Fdiv>`;\n                html += `<table><thead><tr><th style=\"width:50px\"><\u002Fth>`;\n                DAYS.forEach(d => html += `<th>${d}<\u002Fth>`);\n                html += `<\u002Ftr><\u002Fthead><tbody>`;\n\n                ['AM','PM'].forEach(slot => {\n                    const label = slot === 'AM' ? '☀️ AM' : '🌙 PM';\n                    html += `<tr><td class=\"ciclo-slot-label\">${label}<\u002Ftd>`;\n                    DAY_IDX.forEach(di => {\n                        const dayData = data.acts[di];\n                        const psOnDay = data.ps.find(p => p.weekday === di);\n\n                        if (psOnDay && !dayData) {\n                            if (slot === 'AM') {\n                                html += `<td class=\"ciclo-ps\" rowspan=\"2\">PS<br>${psOnDay.hr}<\u002Ftd>`;\n                            }\n                        } else {\n                            const act = dayData ? (dayData[slot] || '') : '';\n                            let cls = '';\n                            if (act.startsWith('Cir.') || act.startsWith('PC ')) cls = ' ciclo-act-cir';\n                            else if (act === 'PO' || act === 'Yag/PO') cls = ' ciclo-act-po';\n                            else if (act.startsWith('PS ')) cls = ' ciclo-ps';\n                            html += `<td class=\"${cls}\">${act}<\u002Ftd>`;\n                        }\n                    });\n                    html += `<\u002Ftr>`;\n                });\n\n                html += `<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n            });\n\n            container.innerHTML = html;\n        })();\n    <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
